<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedCloud - Gestión Médica Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Librerías para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.delegate.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxiXMFXYNxQQrXF9uD2U4kH7441WzCR5dqn-FHnOZOamkmOtdqScd6Vak4Q5txPlkwl/exec';
        let SESSION_TOKEN = ''; 
        let emitters = [], recipients = [], patients = [], services = [], savedReceipts = [];
        let receiptItems = [], nextReceiptNumber = 1, editingReceiptId = null;

        let currentBankData = { banco: 'N/A', cuenta: 'N/A', tipo: 'N/A', pagomovil: 'N/A', cedula: 'N/A', direccion: '' };

        function normalizeObjectKeys(obj) {
            const normalized = {};
            for (let key in obj) {
                const cleanKey = key.trim().toLowerCase().replace(/\s+/g, '');
                normalized[cleanKey] = obj[key];
            }
            return normalized;
        }

        function checkAccess() {
            const passInput = document.getElementById('login-password').value.trim();
            if (passInput) {
                SESSION_TOKEN = passInput;
                fetchAllData(true);
            }
        }

        function logout() {
            localStorage.removeItem('medcloud_session_token');
            location.reload();
        }

        function showMessage(msg, isError = false) {
            const container = document.getElementById('message-container');
            if (!container) return;
            container.textContent = msg;
            container.className = `fixed top-6 right-6 p-4 rounded-2xl shadow-2xl z-[100] transition-all duration-500 font-bold ${isError ? 'bg-rose-500 text-white' : 'bg-emerald-500 text-white'}`;
            container.style.opacity = '1';
            setTimeout(() => { container.style.opacity = '0'; }, 4000);
        }

        async function fetchAllData(isInitialLogin = false) {
            const loader = document.getElementById('global-loader');
            if (loader) loader.classList.remove('hidden');
            const tokenToUse = SESSION_TOKEN || localStorage.getItem('medcloud_session_token');
            if (!tokenToUse) { if (loader) loader.classList.add('hidden'); return; }

            try {
                const urlWithParams = `${API_URL}?action=getAll&token=${encodeURIComponent(tokenToUse)}`;
                const response = await fetch(urlWithParams, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const result = await response.json();
                
                if (result && result.status === 'success') {
                    SESSION_TOKEN = tokenToUse;
                    localStorage.setItem('medcloud_session_token', SESSION_TOKEN);
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');

                    const d = result.data;
                    
                    emitters = (d.Emisores || []).map(e => {
                        const norm = normalizeObjectKeys(e);
                        return { 
                            ...e, 
                            _norm: norm,
                            banco: norm.banco || e.banco || 'N/A',
                            cuenta: norm.cuenta || e.cuenta || 'N/A',
                            tipocuenta: norm.tipocuenta || e.tipocuenta || 'N/A',
                            pagomovil: norm.pagomovil || e.pagomovil || 'N/A',
                            cedula: norm.cedula || norm.ci || e.cedula || 'N/A',
                            direccion: norm.direccion || e.direccion || ''
                        };
                    });

                    recipients = d.Receptores || [];
                    patients = (d.Pacientes || []).map(p => ({
                        ...p,
                        displayName: `${p.nombre || ''} ${p.apellido || ''}`.trim(),
                        cedula: p.cedula || p.ci || "",
                        familiar: p.familiar || "" 
                    })).sort((a, b) => a.displayName.localeCompare(b.displayName));
                    
                    services = (d.Servicios || []).map(s => {
                        const norm = normalizeObjectKeys(s);
                        return { ...s, _norm: norm };
                    });

                    savedReceipts = d.RecibosGuardados || [];
                    const config = d.Configuracion || [];
                    
                    const corr = config.find(c => (c.clave || '').toLowerCase() === 'correlativo');
                    nextReceiptNumber = corr ? parseInt(corr.valor) : 1;

                    updateDropdowns();
                    renderManagementLists();
                    renderHistory();
                    updateReceiptNumberDisplay();
                    handleEmitterChange(); 
                } else {
                    if (isInitialLogin) {
                        document.getElementById('login-error').classList.remove('hidden');
                        setTimeout(() => document.getElementById('login-error').classList.add('hidden'), 3000);
                    }
                }
            } catch (e) { 
                console.error("Error al obtener datos:", e);
            } finally {
                if (loader) loader.classList.add('hidden');
            }
        }

        function handleEmitterChange() {
            const eId = document.getElementById('emitter-select').value;
            const emisor = emitters.find(e => String(e.id) === String(eId));
            
            if (emisor) {
                currentBankData = {
                    banco: emisor.banco,
                    cuenta: emisor.cuenta,
                    tipo: emisor.tipocuenta,
                    pagomovil: emisor.pagomovil,
                    cedula: emisor.cedula,
                    direccion: emisor.direccion
                };
            } else {
                currentBankData = { banco: 'N/A', cuenta: 'N/A', tipo: 'N/A', pagomovil: 'N/A', cedula: 'N/A', direccion: '' };
            }
            
            renderBankInfoUI();
            updateReceiptNumberDisplay();
        }

        function renderBankInfoUI() {
            const updateText = (id, text) => {
                const el = document.getElementById(id);
                if (el) el.textContent = text;
            };
            updateText('ui-banco', currentBankData.banco);
            updateText('ui-cuenta', currentBankData.cuenta);
            updateText('ui-tipocuenta', currentBankData.tipo);
            updateText('ui-pagomovil', currentBankData.pagomovil);
            updateText('ui-cedula', currentBankData.cedula);
        }

        function updateReceiptNumberDisplay() {
            const eId = document.getElementById('emitter-select').value;
            const emisor = emitters.find(e => String(e.id) === String(eId));
            const display = document.getElementById('receipt-number-display');
            if (!display) return;

            const docType = document.getElementById('doc-type-select').value;
            const patientField = document.getElementById('container-paciente');
            const dateField = document.getElementById('container-fecha-servicio');

            if (docType === 'presupuesto') {
                display.textContent = "SOLO LECTURA";
                if (patientField) patientField.classList.add('hidden');
                if (dateField) dateField.classList.add('hidden');
                return;
            } else {
                if (patientField) patientField.classList.remove('hidden');
                if (dateField) dateField.classList.remove('hidden');
            }

            if (editingReceiptId) {
                const r = savedReceipts.find(r => r.id === editingReceiptId);
                display.textContent = r ? r.numerorecibo : "00000";
            } else {
                display.textContent = (emisor && (emisor.usarcorrelativo === true || emisor.usarcorrelativo === "true")) ? nextReceiptNumber.toString().padStart(5, '0') : "S/N";
            }
        }

        async function processReceipt() {
            if (receiptItems.length === 0) return showMessage("El documento está vacío.", true);
            const emisorSelect = document.getElementById('emitter-select').value;
            const receptorSelect = document.getElementById('recipient-select').value;
            const emisor = emitters.find(e => String(e.id) === emisorSelect);
            const receptor = recipients.find(r => String(r.id) === receptorSelect);
            const totalUSD = parseFloat(document.getElementById('total-usd').textContent);
            const rate = parseFloat(document.getElementById('bcv-rate').value) || 0;
            const docType = document.getElementById('doc-type-select').value;

            if (!emisor || !receptor) return showMessage("Seleccione emisor y receptor.", true);

            const receiptId = editingReceiptId || 'REC-' + Date.now();
            
            let numRecibo = "S/N";
            if (docType === 'presupuesto') {
                numRecibo = ""; 
            } else {
                numRecibo = editingReceiptId ? savedReceipts.find(r => r.id === editingReceiptId).numerorecibo : 
                             ((emisor.usarcorrelativo === true || emisor.usarcorrelativo === "true") ? nextReceiptNumber.toString().padStart(5, '0') : "S/N");
            }

            const payload = {
                id: receiptId,
                fecha_creacion: new Date().toISOString(),
                fecharecibo: document.getElementById('issue-date').value, 
                numerorecibo: numRecibo,
                nombreemisor: emisor.nombre,
                nombrereceptor: receptor.nombre,
                totalusd: totalUSD,
                totalbs: totalUSD * rate,
                jsoncompleto: JSON.stringify({ 
                    emisor, 
                    receptor, 
                    items: receiptItems, 
                    totalUSD, 
                    rate, 
                    bankData: currentBankData,
                    docType: docType
                })
            };

            try {
                showMessage("Generando documento...");
                
                if (docType === 'recibo') {
                    await fetch(`${API_URL}?token=${encodeURIComponent(SESSION_TOKEN)}`, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: editingReceiptId ? 'update' : 'create', collection: 'RecibosGuardados', payload })
                    });
                }

                setTimeout(async () => {
                    downloadPDF(null, payload); 
                    if (docType === 'recibo') {
                        cancelEdit();
                        await fetchAllData();
                        showMessage("Recibo guardado y generado.");
                    } else {
                        showMessage("Presupuesto generado con éxito.");
                    }
                }, 1000);
            } catch (e) { showMessage("Error al procesar.", true); }
        }

        function downloadPDF(id, directData = null) {
            const receipt = directData || savedReceipts.find(r => r.id === id);
            if (!receipt) return;
            const data = JSON.parse(receipt.jsoncompleto);
            const { emisor, receptor, items, totalUSD, rate, docType } = data;
            const bData = data.bankData || currentBankData;
            const isPresupuesto = (docType === 'presupuesto');

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
            const marginX = 15;
            const pageWidth = doc.internal.pageSize.getWidth();
            let currentY = 15;

            const fRaw = receipt.fecharecibo || "";
            let fFinal = "";
            if (fRaw) {
                const parts = fRaw.split('T')[0].split('-');
                if (parts.length === 3) {
                    fFinal = parts[2] + "/" + parts[1] + "/" + parts[0];
                } else fFinal = fRaw;
            }

            // Membrete Emisor
            doc.setFont("helvetica", "bold");
            doc.setFontSize(13);
            doc.text(emisor.nombre.toUpperCase(), pageWidth / 2, currentY, { align: "center" });
            currentY += 5;
            
            doc.setFontSize(8.5);
            doc.text((emisor.especialidad || emisor.descripcion || "MÉDICO").toUpperCase(), pageWidth / 2, currentY, { align: "center" });
            
            if (emisor.rif) {
                currentY += 4.5;
                doc.text(emisor.rif.toUpperCase(), pageWidth / 2, currentY, { align: "center" });
            }

            if (emisor.direccion) {
                currentY += 4.5;
                doc.setFont("helvetica", "normal");
                doc.setFontSize(7.5);
                const emisorDir = doc.splitTextToSize(emisor.direccion.toUpperCase(), pageWidth - 60);
                doc.text(emisorDir, pageWidth / 2, currentY, { align: "center" });
                currentY += (emisorDir.length > 1 ? 7 : 4.5);
            } else {
                currentY += 5;
            }

            // Información del Cliente
            currentY += 2;
            doc.setFillColor(248, 250, 252);
            doc.roundedRect(marginX, currentY, pageWidth - (marginX * 2), 28, 3, 3, 'F');
            doc.setFont("helvetica", "normal");
            doc.setFontSize(8);
            doc.setTextColor(100, 116, 139);
            doc.text("CLIENTE:", marginX + 5, currentY + 7);
            
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.text(receptor.nombre.toUpperCase(), marginX + 5, currentY + 13);
            doc.setFontSize(8);
            const dir = doc.splitTextToSize(`DIRECCIÓN: ${receptor.direccion || 'N/A'}`, pageWidth - marginX * 2 - 10);
            doc.text(dir, marginX + 5, currentY + 18);
            doc.text(`TELÉFONO: ${receptor.telefono || 'N/A'}  |  ID / RIF: ${receptor.rif || 'N/A'}`, marginX + 5, currentY + 23);

            currentY += 38;
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(79, 70, 229);
            
            const mainTitle = isPresupuesto ? "PRESUPUESTO DE SERVICIOS MÉDICOS" : "RELACIÓN SERVICIOS MÉDICOS";
            doc.text(mainTitle, pageWidth / 2, currentY, { align: "center" });

            currentY += 8;
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(8);
            doc.setFont("helvetica", "normal");
            doc.text(`FECHA: ${fFinal}`, marginX, currentY);
            
            if (!isPresupuesto) {
                doc.setFont("helvetica", "bold");
                doc.text(`RECIBO NRO: ${receipt.numerorecibo}`, pageWidth - marginX, currentY, { align: "right" });
            }

            // Tabla
            let headCols, bodyData, colStyles;

            if (isPresupuesto) {
                headCols = [['N°', 'SERVICIO', 'CANT', 'P/U', 'TOTAL']];
                bodyData = items.map((item, index) => {
                    const puValue = parseFloat(item.precioUnitario) || 0;
                    const totalLinea = parseFloat(item.precioTotalLinea) || 0;
                    return [
                        index + 1, 
                        item.descripcion, 
                        item.quantity, 
                        `${puValue.toLocaleString('en-US', {minimumFractionDigits: 2})} $`, 
                        `${totalLinea.toLocaleString('en-US', {minimumFractionDigits: 2})} $`
                    ];
                });
                colStyles = { 
                    0: { cellWidth: 10, halign: 'center' }, 
                    2: { cellWidth: 20, halign: 'center' }, 
                    3: { cellWidth: 25, halign: 'right' }, 
                    4: { cellWidth: 25, halign: 'right' } 
                };
            } else {
                headCols = [['N°', 'FECHA', 'NOMBRES CI / PACIENTE', 'SERVICIO', 'CANT', 'P/U', 'TOTAL']];
                bodyData = items.map((item, index) => {
                    const puValue = parseFloat(item.precioUnitario) || 0;
                    const totalLinea = parseFloat(item.precioTotalLinea) || 0;
                    let pacInfo = `${item.beneficiario} CI: ${item.cedula || 'N/A'}`;
                    if (item.familiar && item.familiar.trim() !== "") pacInfo += `\n(${item.familiar.trim()})`;
                    return [
                        index + 1, 
                        item.date, 
                        pacInfo, 
                        item.descripcion, 
                        item.quantity, 
                        `${puValue.toLocaleString('en-US', {minimumFractionDigits: 2})} $`, 
                        `${totalLinea.toLocaleString('en-US', {minimumFractionDigits: 2})} $`
                    ];
                });
                colStyles = { 
                    0: { cellWidth: 10, halign: 'center' }, 
                    1: { cellWidth: 20, halign: 'center' }, 
                    2: { cellWidth: 53 }, 
                    4: { cellWidth: 14, halign: 'center' }, 
                    5: { cellWidth: 18, halign: 'right' }, 
                    6: { cellWidth: 20, halign: 'right' } 
                };
            }

            doc.autoTable({
                startY: currentY + 4,
                margin: { left: marginX, right: marginX },
                head: headCols,
                body: bodyData,
                theme: 'grid',
                headStyles: { fillColor: [79, 70, 229], textColor: [255, 255, 255], fontStyle: 'bold', fontSize: 8, halign: 'center' },
                styles: { fontSize: 7.5, cellPadding: 3, valign: 'middle', lineColor: [226, 232, 240] },
                columnStyles: colStyles
            });

            let finalY = doc.lastAutoTable.finalY + 10;
            const boxWidth = 70;
            const boxHeight = (rate > 0) ? 24 : 14;
            const boxX = pageWidth - marginX - boxWidth;

            // Info Bancaria
            doc.setFontSize(8);
            doc.setFont("helvetica", "bold");
            doc.setTextColor(79, 70, 229);
            doc.text("MÉTODOS DE PAGO:", marginX, finalY - 2);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(51, 65, 85);
            doc.text(`BANCO: ${bData.banco}`, marginX, finalY + 3);
            doc.text(`${bData.tipo}: ${bData.cuenta}`, marginX, finalY + 7);
            doc.text(`PAGO MÓVIL: ${bData.pagomovil} | C.I: ${bData.cedula}`, marginX, finalY + 11);

            doc.setFontSize(7);
            doc.setTextColor(100, 116, 139);
            const msgValidez = isPresupuesto ? "" : "Gracias por su confianza.";
            if (msgValidez) doc.text(msgValidez, marginX, finalY + 16);

            // CAJA DE TOTALES - AJUSTADA PARA MAYOR CLARIDAD
            doc.setFillColor(245, 243, 255); // Fondo lila más claro y limpio
            doc.setDrawColor(221, 214, 254); // Borde lila suave para definición
            doc.roundedRect(boxX, finalY, boxWidth, boxHeight, 2, 2, 'FD');
            
            // Texto dentro de la caja
            doc.setTextColor(30, 41, 59); // Slate-800
            doc.setFontSize(9);
            doc.setFont("helvetica", "bold");
            
            const labelTotal = isPresupuesto ? "TOTAL:" : "TOTAL:";
            doc.text(labelTotal, boxX + 6, finalY + 9);
            
            doc.setFontSize(12); // Monto ligeramente más grande
            doc.text(`$ ${totalUSD.toLocaleString('en-US', {minimumFractionDigits: 2})}`, pageWidth - marginX - 6, finalY + 9, { align: "right" });

            if (rate > 0) {
                doc.setDrawColor(221, 214, 254);
                doc.setLineWidth(0.2);
                doc.line(boxX + 6, finalY + 13, pageWidth - marginX - 6, finalY + 13);
                
                doc.setFontSize(7);
                doc.setTextColor(100, 116, 139); 
                doc.setFont("helvetica", "normal");
                doc.text(`TASA BCV: ${rate.toFixed(4)}`, boxX + 6, finalY + 17);
                
                doc.setFontSize(10);
                doc.setFont("helvetica", "bold");
                doc.setTextColor(30, 41, 59);
                doc.text(`${(totalUSD * rate).toLocaleString('es-VE', {minimumFractionDigits:2})} Bs.`, pageWidth - marginX - 6, finalY + 21, { align: "right" });
            }
            
            const fileName = isPresupuesto ? `Presupuesto-${receptor.nombre.slice(0,10)}` : `Recibo-${receipt.numerorecibo}`;
            doc.save(`${fileName}.pdf`);
        }

        function addServiceToReceipt(e) {
            e.preventDefault();
            const sId = document.getElementById('service-select').value;
            const docType = document.getElementById('doc-type-select').value;
            const service = services.find(s => String(s.id) === String(sId));
            
            if (!service) return showMessage("Falta seleccionar el servicio.", true);

            let patientName = "N/A";
            let patientCedula = "";
            let patientFamiliar = "";
            let serviceDateText = "N/A";
            let serviceDateISO = new Date().toISOString();

            if (docType === 'recibo') {
                const pSearch = document.getElementById('patient-search').value;
                const date = document.getElementById('service-date').value;
                const patient = patients.find(p => p.displayName === pSearch);
                
                if (!patient || !date) return showMessage("Faltan datos del paciente o fecha.", true);
                
                patientName = patient.displayName;
                patientCedula = patient.cedula;
                patientFamiliar = patient.familiar;
                serviceDateText = date.split('-').reverse().join('/');
                serviceDateISO = date;
            }
            
            const sheetQty = parseFloat(getNormValue(service, ['cantidad', 'cant', 'quantity']) || 1);
            const currentQty = isNaN(sheetQty) || sheetQty === 0 ? 1 : sheetQty;
            const valorPUTabla = parseFloat(getNormValue(service, ['preciounitario', 'pu', 'p/u']) || 0);
            const valorTotalLinea = valorPUTabla * currentQty;

            receiptItems.push({ 
                ...service, 
                beneficiario: patientName, 
                cedula: patientCedula, 
                familiar: patientFamiliar, 
                date: serviceDateText, 
                dateISO: serviceDateISO, 
                quantity: currentQty, 
                precioUnitario: valorPUTabla, 
                precioTotalLinea: valorTotalLinea, 
                tempId: Date.now() + Math.random() 
            });

            if (docType === 'recibo') {
                receiptItems.sort((a,b) => new Date(a.dateISO) - new Date(b.dateISO));
            }

            renderReceiptItems();
            showMessage(`Agregado: ${service.descripcion} (${currentQty}x)`);
        }

        function renderReceiptItems() {
            const list = document.getElementById('receipt-items-list');
            if (!list) return;
            const docType = document.getElementById('doc-type-select').value;
            let total = 0;
            
            list.innerHTML = receiptItems.map(item => {
                total += item.precioTotalLinea;
                const displayInfo = (docType === 'recibo') 
                    ? `<b>${item.date}</b> - ${item.descripcion} (${item.quantity}x)<br><span class="text-slate-400 uppercase font-bold text-[9px]">Paciente: ${item.beneficiario}</span>`
                    : `<b>${item.descripcion}</b> (${item.quantity}x)`;

                return `<li class="bg-white p-4 rounded-2xl mb-3 flex justify-between items-center text-xs shadow-sm border border-slate-100 animate-fadeIn">
                    <div class="flex items-center gap-3">
                        <div class="h-8 w-8 bg-indigo-50 rounded-lg flex items-center justify-center text-indigo-500"><i class="fas fa-hand-holding-medical"></i></div>
                        <div>${displayInfo}</div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="font-black text-indigo-600 text-sm">$${item.precioTotalLinea.toFixed(2)}</div>
                        <button onclick="removeItem(${item.tempId})" class="text-rose-400 hover:scale-110 transition-transform"><i class="fas fa-times-circle"></i></button>
                    </div></li>`;
            }).join('');
            document.getElementById('total-usd').textContent = total.toFixed(2);
            const rate = parseFloat(document.getElementById('bcv-rate').value) || 0;
            document.getElementById('total-bs').textContent = (total * rate).toLocaleString('es-VE', {minimumFractionDigits:2});
        }

        function removeItem(id) { receiptItems = receiptItems.filter(i => i.tempId !== id); renderReceiptItems(); }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (!list) return;
            const sorted = [...savedReceipts].sort((a,b) => new Date(b.fecha_creacion) - new Date(a.fecha_creacion));
            list.innerHTML = sorted.map(r => `
                <div class="p-5 bg-white border border-slate-100 rounded-[2rem] mb-3 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="h-10 w-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-400"><i class="fas fa-file-invoice-dollar"></i></div>
                        <div><b class="text-sm">Recibo ${r.numerorecibo}</b><div class="text-[10px] text-slate-400 uppercase font-bold">${r.nombrereceptor}</div></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick='downloadPDF("${r.id}")' class="h-8 w-8 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center"><i class="fas fa-file-pdf"></i></button>
                    </div>
                </div>`).join('');
        }

        function cancelEdit() {
            editingReceiptId = null; receiptItems = [];
            const title = document.getElementById('receipt-action-title');
            if(title) title.textContent = "Nuevo Recibo";
            renderReceiptItems();
            handleEmitterChange(); 
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('bg-indigo-600', 'text-white'));
            document.getElementById(`btn-${tab}`).classList.add('bg-indigo-600', 'text-white');
        }

        function updateDropdowns() {
            const fill = (id, list, key) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.innerHTML = `<option value="">Seleccionar...</option>` + list.map(i => `<option value="${i.id}">${i[key] || i.nombre || i.descripcion}</option>`).join('');
            };
            fill('emitter-select', emitters, 'nombre');
            fill('recipient-select', recipients, 'nombre');
            fill('service-select', services, 'descripcion');
            
            const pList = document.getElementById('patients-list');
            if(pList) pList.innerHTML = patients.map(p => `<option value="${p.displayName}">`).join('');
        }

        function renderManagementLists() {
            const container = document.getElementById('list-s');
            if(!container) return;
            container.innerHTML = services.map(s => `
                <div class="p-4 bg-white mb-2 rounded-2xl border border-slate-100 shadow-sm flex justify-between">
                    <span class="text-xs font-bold">${s.descripcion}</span>
                    <span class="text-indigo-600 font-black">$${parseFloat(getNormValue(s, ['precio']) || 0).toFixed(2)}</span>
                </div>`).join('');
        }

        function getNormValue(service, keys) {
            if (!service || !service._norm) return null;
            for (let k of keys) {
                const cleanK = k.toLowerCase().replace(/\s+/g, '');
                if (service._norm[cleanK] !== undefined) return service._norm[cleanK];
            }
            return null;
        }

        window.onload = () => { 
            const savedToken = localStorage.getItem('medcloud_session_token');
            if (savedToken) { SESSION_TOKEN = savedToken; fetchAllData(); }
            const sDate = document.getElementById('service-date');
            const iDate = document.getElementById('issue-date');
            if(sDate) sDate.valueAsDate = new Date(); 
            if(iDate) iDate.valueAsDate = new Date(); 
            const eSel = document.getElementById('emitter-select');
            if(eSel) eSel.addEventListener('change', handleEmitterChange);

            const docTypeSel = document.getElementById('doc-type-select');
            if(docTypeSel) {
                docTypeSel.addEventListener('change', () => {
                    updateReceiptNumberDisplay();
                    renderReceiptItems(); 
                });
            }
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 sm:p-6 min-h-screen text-slate-800">
    <div id="login-screen" class="fixed inset-0 bg-slate-50 z-[300] flex items-center justify-center p-6">
        <div class="max-w-md w-full bg-white p-10 rounded-[3.5rem] shadow-2xl border border-slate-100 text-center">
            <div class="h-20 w-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center text-white text-3xl mx-auto mb-8"><i class="fas fa-fingerprint"></i></div>
            <h2 class="text-3xl font-black text-slate-900 mb-2 uppercase">MedCloud Pro</h2>
            <p class="text-slate-400 text-sm font-semibold mb-10 tracking-widest uppercase">Seguridad Acceso</p>
            <input type="password" id="login-password" placeholder="••••••••" class="w-full p-6 rounded-3xl bg-slate-50 border border-slate-100 mb-6 text-center text-2xl font-bold outline-none">
            <button onclick="checkAccess()" class="w-full bg-indigo-600 text-white py-6 rounded-full font-black uppercase tracking-widest text-sm">Ingresar</button>
            <p id="login-error" class="hidden text-rose-500 text-xs mt-6 font-bold uppercase">Token Inválido</p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <div id="global-loader" class="fixed inset-0 bg-slate-900/10 backdrop-blur-sm z-[200] flex items-center justify-center hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl flex items-center gap-4">
                <div class="w-4 h-4 bg-indigo-600 rounded-full animate-bounce"></div>
                <span class="text-xs font-black uppercase tracking-widest text-slate-600">Procesando...</span>
            </div>
        </div>

        <div id="message-container" class="opacity-0 pointer-events-none transition-all fixed top-6 right-6 z-[100]"></div>
        
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 space-y-6">
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-white">
                    <div class="flex items-center gap-4 mb-10">
                        <div class="h-12 w-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white"><i class="fas fa-stethoscope"></i></div>
                        <div>
                            <h1 class="text-lg font-black tracking-tighter text-slate-900 leading-none">MEDCLOUD</h1>
                            <span class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest">PRO V2.5</span>
                        </div>
                    </div>
                    <nav class="space-y-2">
                        <button id="btn-recibos" onclick="switchTab('recibos')" class="tab-btn w-full p-5 rounded-3xl text-left text-sm font-extrabold bg-indigo-600 text-white flex items-center gap-4 transition-all">
                            <i class="fas fa-plus-circle"></i> <span id="receipt-action-title">Nuevo Recibo</span>
                        </button>
                        <button id="btn-historial" onclick="switchTab('historial')" class="tab-btn w-full p-5 rounded-3xl text-left text-sm font-extrabold text-slate-400 flex items-center gap-4 hover:bg-slate-50 transition-all">
                            <i class="fas fa-folder-open"></i> Historial
                        </button>
                    </nav>
                </div>
                
                <div class="bg-slate-900 p-8 rounded-[3rem] text-white shadow-2xl">
                    <label class="text-[10px] font-black text-indigo-300 block mb-2 uppercase tracking-widest">Tasa BCV</label>
                    <div class="flex items-center">
                        <span class="text-2xl font-bold text-slate-500 mr-2">Bs.</span>
                        <input type="number" id="bcv-rate" step="any" oninput="renderReceiptItems()" placeholder="0.00" class="w-full bg-transparent p-0 text-emerald-400 font-black text-4xl outline-none">
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[3rem] border border-white shadow-sm space-y-4">
                    <div class="text-[9px] font-black text-slate-300 uppercase tracking-[0.3em] mb-2 border-b border-slate-50 pb-2">Información Actual</div>
                    <div class="space-y-3">
                        <div>
                            <span class="text-[8px] font-black text-indigo-400 uppercase block">Correlativo Actual</span>
                            <span id="receipt-number-display" class="text-xs font-bold text-slate-700">Cargando...</span>
                        </div>
                        <div>
                            <span class="text-[8px] font-black text-indigo-400 uppercase block">Banco</span>
                            <span id="ui-banco" class="text-xs font-bold text-slate-700">...</span>
                        </div>
                        <div>
                            <span class="text-[8px] font-black text-indigo-400 uppercase block">Pago Móvil</span>
                            <span id="ui-pagomovil" class="text-xs font-bold text-slate-700">...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-9 bg-white rounded-[3.5rem] shadow-sm border border-white min-h-[85vh] flex flex-col overflow-hidden">
                <div id="tab-recibos" class="tab-content p-6 sm:p-12 space-y-10 flex-1 overflow-y-auto">
                    <div class="bg-indigo-50/50 p-6 rounded-[2.5rem] border border-indigo-100 flex flex-wrap gap-8 items-center">
                        <div class="flex-1 min-w-[200px] space-y-2">
                            <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-4">Emisión de Documento</label>
                            <select id="doc-type-select" class="w-full p-4 bg-white border border-indigo-100 rounded-2xl text-sm font-bold outline-none">
                                <option value="recibo">Recibo de Pago (Genera Numeración y Guarda)</option>
                                <option value="presupuesto">Presupuesto / Cotización (Sin número)</option>
                            </select>
                        </div>
                        <div class="hidden md:block">
                            <i class="fas fa-file-invoice text-indigo-200 text-4xl"></i>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Emisor</label>
                            <select id="emitter-select" class="w-full p-5 bg-slate-50 border border-slate-50 rounded-3xl text-sm font-bold outline-none"></select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Receptor</label>
                            <select id="recipient-select" class="w-full p-5 bg-slate-50 border border-slate-50 rounded-3xl text-sm font-bold outline-none"></select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Fecha Emisión</label>
                            <input type="date" id="issue-date" class="w-full p-5 bg-slate-50 border border-slate-50 rounded-3xl text-sm font-bold outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div class="lg:col-span-5 bg-indigo-50/30 p-8 rounded-[3rem] space-y-5 border border-indigo-100/50">
                            <div id="container-paciente" class="space-y-2 animate-fadeIn">
                                <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-4">Paciente</label>
                                <input type="text" id="patient-search" list="patients-list" placeholder="Buscar paciente..." class="w-full p-5 rounded-3xl bg-white text-sm font-bold outline-none border border-indigo-100">
                                <datalist id="patients-list"></datalist>
                            </div>
                            <div id="container-fecha-servicio" class="space-y-2 animate-fadeIn">
                                <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-4">Fecha Servicio</label>
                                <input type="date" id="service-date" class="w-full p-5 rounded-3xl bg-white text-xs font-bold outline-none border border-indigo-100">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-indigo-400 uppercase tracking-widest ml-4">Servicio / Descripción</label>
                                <select id="service-select" class="w-full p-5 rounded-3xl bg-white text-sm font-bold outline-none border border-indigo-100"></select>
                            </div>
                            <button onclick="addServiceToReceipt(event)" class="w-full bg-slate-900 text-white p-5 rounded-full font-black text-[10px] uppercase tracking-widest">Añadir Item</button>
                        </div>

                        <div class="lg:col-span-7 flex flex-col">
                            <div class="bg-indigo-600 rounded-[2.5rem] p-6 mb-6 flex justify-between items-center text-white shadow-lg shadow-indigo-200">
                                <div><span class="text-[10px] font-bold opacity-70 block uppercase">Total Documento</span><div class="text-3xl font-black tracking-tighter">$<span id="total-usd">0.00</span></div></div>
                                <div class="text-right"><span class="text-[10px] font-bold opacity-70 block uppercase">Total Bs.</span><div class="text-xl font-bold">Bs. <span id="total-bs">0,00</span></div></div>
                            </div>
                            <div class="flex-1 min-h-[250px] bg-slate-50/50 rounded-[2.5rem] p-6 mb-6 overflow-y-auto border border-slate-100">
                                <ul id="receipt-items-list" class="space-y-3"></ul>
                            </div>
                            <button onclick="processReceipt()" class="w-full bg-indigo-600 text-white py-6 rounded-full font-black shadow-xl uppercase tracking-widest text-xs hover:scale-[1.02] transition-transform">Generar PDF</button>
                        </div>
                    </div>
                </div>

                <div id="tab-historial" class="tab-content hidden p-10 flex-1 overflow-y-auto">
                    <h3 class="text-xl font-black mb-8">Historial de Recibos Guardados</h3>
                    <div id="history-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>
    </div>
</body>
