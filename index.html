<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedCloud - Gestión Médica Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxiXMFXYNxQQrXF9uD2U4kH7441WzCR5dqn-FHnOZOamkmOtdqScd6Vak4Q5txPlkwl/exec';
        let SESSION_TOKEN = ''; 
        let emitters = [], recipients = [], patients = [], services = [], savedReceipts = [], savedBudgets = [];
        let receiptItems = [], nextReceiptNumber = 1;
        let editingDocumentId = null;
        let currentHistoryType = 'recibos'; // Para controlar qué historial mostrar

        function formatNumber(num, decimals = 2) {
            if (isNaN(num) || num === null) return "0,00";
            return new Intl.NumberFormat('de-DE', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            }).format(num);
        }

        function normalizeObjectKeys(obj) {
            if (!obj) return {};
            const normalized = {};
            for (let key in obj) {
                const cleanKey = key.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '');
                normalized[cleanKey] = obj[key];
            }
            return normalized;
        }

        function formatDate(dateStr) {
            if (!dateStr) return "N/A";
            const parts = dateStr.split('T')[0].split('-');
            if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
            return dateStr;
        }

        function formatShortDate(dateStr) {
            if (!dateStr) return "";
            const parts = dateStr.split('T')[0].split('-');
            if (parts.length === 3) {
                const yearShort = parts[0].slice(-2);
                return `${parts[2]}-${parts[1]}-${yearShort}`;
            }
            return dateStr;
        }

        function toSentenceCase(str) {
            if (!str) return "";
            const s = str.toString();
            return s.charAt(0).toUpperCase() + s.slice(1);
        }

        async function checkAccess() {
            const passInput = document.getElementById('login-password');
            const token = passInput.value.trim();
            if (!token) return;
            SESSION_TOKEN = token;
            await fetchAllData(true);
        }

        async function fetchAllData(isInitialLogin = false) {
            const loader = document.getElementById('global-loader');
            if (loader) loader.classList.remove('hidden');
            const tokenToUse = SESSION_TOKEN || localStorage.getItem('medcloud_session_token');
            if (!tokenToUse) { 
                if (loader) loader.classList.add('hidden'); 
                return; 
            }

            try {
                const urlWithParams = `${API_URL}?action=getAll&token=${encodeURIComponent(tokenToUse)}`;
                const response = await fetch(urlWithParams, { method: 'GET', mode: 'cors', redirect: 'follow' });
                const result = await response.json();
                
                if (result && result.status === 'success') {
                    SESSION_TOKEN = tokenToUse;
                    localStorage.setItem('medcloud_session_token', SESSION_TOKEN);
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app-container').classList.remove('hidden');
                    document.getElementById('app-main').classList.remove('hidden');

                    const d = result.data;
                    const normalizedData = normalizeObjectKeys(d);

                    emitters = (d.Emisores || d.emisores || normalizedData.emisores || []).map(e => {
                        const norm = normalizeObjectKeys(e);
                        return { ...e, id: e.id || norm.id, _norm: norm };
                    });
                    
                    recipients = (d.Receptores || d.receptores || normalizedData.receptores || []).map(r => ({ ...r, id: r.id || normalizeObjectKeys(r).id }));
                    
                    patients = (d.Pacientes || d.pacientes || normalizedData.pacientes || []).map(p => ({
                        ...p,
                        displayName: `${p.nombre || ''} ${p.apellido || ''}`.trim(),
                        cedula: p.cedula || p.ci || ""
                    })).sort((a, b) => a.displayName.localeCompare(b.displayName));
                    
                    services = (d.Servicios || d.servicios || normalizedData.servicios || []).map(s => {
                        const norm = normalizeObjectKeys(s);
                        return { ...s, id: s.id || norm.id, precioUnitario: parseFloat(s.precio_unitario || norm.preciounitario || 0), precioTotal: parseFloat(s.precio || norm.precio || 0) };
                    });
                    
                    // CARGA ROBUSTA DE DOCUMENTOS
                    savedReceipts = d.RecibosGuardados || d.recibosguardados || normalizedData.recibosguardados || [];
                    savedBudgets = d.PresupuestosGuardados || d.presupuestosguardados || normalizedData.presupuestosguardados || [];
                    
                    const config = d.Configuracion || normalizedData.configuracion || [];
                    const corr = config.find(c => (c.clave || '').toLowerCase() === 'correlativo');
                    nextReceiptNumber = corr ? parseInt(corr.valor) : 1;

                    updateDropdowns();
                    renderHistory();
                    updateUIStatus();
                } else if (isInitialLogin) {
                    document.getElementById('login-error').classList.remove('hidden');
                    localStorage.removeItem('medcloud_session_token');
                }
            } catch (e) { 
                console.error("Error cargando datos:", e);
            } finally { 
                if (loader) loader.classList.add('hidden'); 
            }
        }

        function updateUIStatus() {
            const emitterEl = document.getElementById('emitter-select');
            const docTypeEl = document.getElementById('doc-type-select');
            const emisor = emitters.find(e => String(e.id) === String(emitterEl.value));
            const docType = docTypeEl.value;

            if (emisor) {
                document.getElementById('ui-banco').textContent = emisor.banco || 'N/A';
                document.getElementById('ui-pagomovil').textContent = emisor.pagomovil || 'N/A';
                document.getElementById('ui-telefono').textContent = emisor.telefono || 'N/A';
                
                const usesCorr = emisor.usarcorrelativo === true || emisor.usarcorrelativo === "true";
                if (!editingDocumentId) {
                    document.getElementById('ui-correlativo').textContent = (docType === 'recibo' && usesCorr) ? nextReceiptNumber.toString().padStart(5, '0') : "S/N";
                }
            }

            const containerPaciente = document.getElementById('container-paciente');
            const containerObs = document.getElementById('container-observaciones');
            const containerFechaServicio = document.getElementById('container-fecha-servicio');

            if (docType === 'presupuesto') {
                containerPaciente.classList.add('hidden');
                containerObs.classList.remove('hidden');
                containerFechaServicio.classList.add('hidden');
            } else {
                containerPaciente.classList.remove('hidden');
                containerObs.classList.add('hidden');
                containerFechaServicio.classList.remove('hidden');
            }
        }

        function addServiceToReceipt(e) {
            e.preventDefault();
            const sId = document.getElementById('service-select').value;
            const docType = document.getElementById('doc-type-select').value;
            const service = services.find(s => String(s.id) === String(sId));
            if (!service) return;

            let pName = "N/A", pCed = "N/A", sDate = "";
            if (docType === 'recibo') {
                const pVal = document.getElementById('patient-search').value;
                const patient = patients.find(p => p.displayName === pVal);
                if (!patient) return;
                pName = patient.displayName; 
                pCed = patient.cedula;
                sDate = document.getElementById('service-date').value;
            }

            receiptItems.push({ 
                ...service, 
                beneficiario: pName, 
                cedula: pCed, 
                fechaServicio: sDate,
                quantity: 1, 
                precioUnitario: service.precioUnitario, 
                precioTotalLinea: service.precioTotal, 
                tempId: Date.now() 
            });
            renderReceiptItems();
        }

        function renderReceiptItems() {
            const list = document.getElementById('receipt-items-list');
            let totalUsd = 0;
            const rate = parseFloat(document.getElementById('bcv-rate').value) || 0;
            
            if (receiptItems.length === 0) {
                list.innerHTML = `<p class="text-center text-slate-300 text-[10px] font-bold uppercase mt-20">No hay servicios añadidos</p>`;
            } else {
                list.innerHTML = receiptItems.map(item => {
                    totalUsd += item.precioTotalLinea;
                    const dateInfo = item.fechaServicio ? ` | Fecha: ${formatShortDate(item.fechaServicio)}` : '';
                    return `<div class="bg-white p-4 rounded-2xl mb-2 flex justify-between items-center border border-slate-100 shadow-sm">
                        <div class="text-[11px]">
                            <b class="text-slate-800">${item.descripcion}</b><br>
                            <span class="text-[9px] text-slate-400 font-bold uppercase">P/U: $${formatNumber(item.precioUnitario)}${dateInfo}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold text-indigo-600">$${formatNumber(item.precioTotalLinea)}</span>
                            <button onclick="removeItem(${item.tempId})" class="text-rose-400"><i class="fas fa-trash"></i></button>
                        </div></div>`;
                }).join('');
            }
            
            document.getElementById('total-usd').textContent = formatNumber(totalUsd);
            document.getElementById('total-bs').textContent = formatNumber(totalUsd * rate);
        }

        function removeItem(id) { receiptItems = receiptItems.filter(i => i.tempId !== id); renderReceiptItems(); }

        async function processReceipt() {
            if (receiptItems.length === 0) return;
            const emisorSelect = document.getElementById('emitter-select').value;
            const receptorSelect = document.getElementById('recipient-select').value;
            const emisor = emitters.find(e => String(e.id) === String(emisorSelect));
            const receptor = recipients.find(r => String(r.id) === String(receptorSelect));
            if (!emisor || !receptor) return;

            const totalUSD = receiptItems.reduce((acc, item) => acc + item.precioTotalLinea, 0);
            const rate = parseFloat(document.getElementById('bcv-rate').value) || 0;
            const docType = document.getElementById('doc-type-select').value;
            const observaciones = document.getElementById('obs-text').value;

            const payload = {
                id: editingDocumentId || ((docType === 'presupuesto' ? 'BUD-' : 'REC-') + Date.now()),
                fecha_creacion: new Date().toISOString(),
                fecharecibo: document.getElementById('issue-date').value, 
                numerorecibo: document.getElementById('ui-correlativo').textContent,
                nombreemisor: emisor.nombre,
                nombrereceptor: receptor.nombre,
                totalusd: totalUSD,
                totalbs: totalUSD * rate,
                jsoncompleto: JSON.stringify({ emisor, receptor, items: receiptItems, totalUSD, rate, docType, observaciones })
            };

            const loader = document.getElementById('global-loader');
            loader.classList.remove('hidden');

            try {
                const collectionName = docType === 'presupuesto' ? 'PresupuestosGuardados' : 'RecibosGuardados';
                await fetch(`${API_URL}?token=${encodeURIComponent(SESSION_TOKEN)}`, {
                    method: 'POST', mode: 'no-cors',
                    body: JSON.stringify({ action: 'create', collection: collectionName, payload })
                });
                setTimeout(() => {
                    downloadPDF(null, payload);
                    resetForm();
                    fetchAllData();
                }, 1000);
            } catch (e) { console.error(e); }
        }

        function editDocument(id) {
            const allDocs = [...savedReceipts, ...savedBudgets];
            const docData = allDocs.find(r => r.id === id);
            if (!docData) return;

            const data = JSON.parse(docData.jsoncompleto);
            editingDocumentId = docData.id;

            switchTab('recibos');

            document.getElementById('doc-type-select').value = data.docType || (docData.id.toString().startsWith('BUD') ? 'presupuesto' : 'recibo');
            updateUIStatus();

            document.getElementById('emitter-select').value = data.emisor.id;
            document.getElementById('recipient-select').value = data.receptor.id;
            document.getElementById('issue-date').value = docData.fecharecibo ? docData.fecharecibo.split('T')[0] : "";
            document.getElementById('ui-correlativo').textContent = docData.numerorecibo || "S/N";
            document.getElementById('bcv-rate').value = data.rate || "";
            document.getElementById('obs-text').value = data.observaciones || "";

            receiptItems = data.items || [];
            renderReceiptItems();
            updateUIStatus();
        }

        function resetForm() {
            editingDocumentId = null;
            receiptItems = [];
            document.getElementById('obs-text').value = "";
            document.getElementById('patient-search').value = "";
            document.getElementById('bcv-rate').value = "";
            document.getElementById('issue-date').valueAsDate = new Date();
            renderReceiptItems();
            updateUIStatus();
        }

        function downloadPDF(id, directData = null) {
            const allDocs = [...savedReceipts, ...savedBudgets];
            const receipt = directData || allDocs.find(r => r.id === id);
            if (!receipt) return;
            
            const data = JSON.parse(receipt.jsoncompleto);
            const { emisor, receptor, items, totalUSD, rate, docType, observaciones } = data;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();
            const safeUpper = (val) => (val || "").toString().toUpperCase();

            // CABECERA
            doc.setFont("helvetica", "bold").setFontSize(13).setTextColor(0);
            doc.text(safeUpper(emisor?.nombre), pageWidth / 2, 20, { align: "center" });
            
            const desc = emisor?.descripcion || emisor?._norm?.descripcion || emisor?._norm?.especialidad || "";
            if(desc) {
                doc.setFontSize(10).setFont("helvetica", "bold").setTextColor(80);
                doc.text(safeUpper(desc), pageWidth / 2, 26, { align: "center" });
            }

            doc.setFontSize(10).setFont("helvetica", "normal").setTextColor(50);
            doc.text(safeUpper(emisor?.rif || emisor?.cedula || emisor?._norm?.cedula), pageWidth / 2, 32, { align: "center" });

            // CLIENTE
            doc.setFillColor(248, 250, 252).roundedRect(15, 42, 180, 28, 3, 3, 'F');
            doc.setFontSize(8).setFont("helvetica", "bold").setTextColor(100).text("CLIENTE:", 20, 49);
            doc.setFontSize(10).setTextColor(0).text(safeUpper(receptor?.nombre), 20, 55);
            doc.setFontSize(8).setFont("helvetica", "normal").setTextColor(60);
            const splitAddress = doc.splitTextToSize(`DIRECCIÓN: ${receptor?.direccion || 'N/A'}`, 170);
            doc.text(splitAddress, 20, 60);
            doc.text(`TELÉFONO: ${receptor?.telefono || 'N/A'} | ID/RIF: ${receptor?.rif || receptor?.cedula || 'N/A'}`, 20, 66);

            // TÍTULO
            const title = docType === 'presupuesto' ? "PRESUPUESTO DE SERVICIOS MÉDICOS" : "RECIBO DE PAGO";
            doc.setFontSize(12).setFont("helvetica", "bold").setTextColor(79, 70, 229).text(title, pageWidth / 2, 82, { align: "center" });
            
            const displayDate = formatDate(receipt.fecharecibo);
            doc.setFontSize(9).setTextColor(0).setFont("helvetica", "normal").text(`FECHA: ${displayDate}`, 15, 92);
            if(docType === 'recibo') doc.text(`NRO: ${receipt.numerorecibo || 'S/N'}`, 195, 92, { align: "right" });

            let currentY = 100;
            if (docType === 'presupuesto' && observaciones) {
                doc.setFont("helvetica", "bold").setFontSize(9).text("OBSERVACIONES / SOLICITUD:", 15, currentY);
                doc.setFont("helvetica", "normal").setFontSize(9).setTextColor(50);
                const splitObs = doc.splitTextToSize(observaciones, 180);
                doc.text(splitObs, 15, currentY + 5);
                currentY += (splitObs.length * 5) + 10;
            }

            // TABLA
            const headers = docType === 'recibo' 
                ? [['N°', 'SERVICIO', 'FECHA SERV.', 'CANT', 'P/U', 'TOTAL']] 
                : [['N°', 'SERVICIO', 'CANT', 'P/U', 'TOTAL']];

            const bodyRows = (items || []).map((i, idx) => {
                if(docType === 'recibo') {
                    return [idx + 1, toSentenceCase(i.descripcion), formatShortDate(i.fechaServicio), i.quantity || 1, `${formatNumber(i.precioUnitario)} $`, `${formatNumber(i.precioTotalLinea)} $`];
                } else {
                    return [idx + 1, toSentenceCase(i.descripcion), i.quantity || 1, `${formatNumber(i.precioUnitario)} $`, `${formatNumber(i.precioTotalLinea)} $`];
                }
            });

            doc.autoTable({
                startY: currentY,
                head: headers,
                body: bodyRows,
                theme: 'grid',
                headStyles: { fillColor: [79, 70, 229], halign: 'center', fontSize: 9 },
                columnStyles: docType === 'recibo' 
                    ? { 0: { halign: 'center' }, 2: { halign: 'center' }, 3: { halign: 'center' }, 4: { halign: 'right' }, 5: { halign: 'right' } }
                    : { 0: { halign: 'center' }, 2: { halign: 'center' }, 3: { halign: 'right' }, 4: { halign: 'right' } }
            });

            let finalY = doc.lastAutoTable.finalY + 8;
            doc.setFontSize(8).setFont("helvetica", "italic").setTextColor(100).text("Precios en bolívares sujetos a tasa oficial BCV del día de pago.", 15, finalY);

            // TOTALES
            finalY += 5;
            const boxHeight = (rate > 0) ? 24 : 14;
            doc.setFillColor(243, 244, 255).roundedRect(120, finalY, 75, boxHeight, 2, 2, 'F');
            doc.setFontSize(10).setFont("helvetica", "bold").setTextColor(79, 70, 229).text("TOTAL USD:", 125, finalY + 9);
            doc.setFontSize(13).text(`$ ${formatNumber(totalUSD)}`, 190, finalY + 9, { align: "right" });

            if (rate > 0) {
                doc.setFontSize(10).text("TOTAL BS:", 125, finalY + 16);
                doc.setFontSize(12).text(`Bs. ${formatNumber(totalUSD * rate)}`, 190, finalY + 16, { align: "right" });
                doc.setFontSize(7).setFont("helvetica", "normal").setTextColor(100).text(`Tasa aplicada: ${formatNumber(rate, 5)} Bs/$`, 190, finalY + 21, { align: "right" });
            }

            // FOOTER
            finalY += boxHeight + 10;
            doc.setFontSize(9).setFont("helvetica", "bold").setTextColor(79, 70, 229).text("MÉTODOS DE PAGO:", 15, finalY);
            doc.setFontSize(8).setTextColor(0).setFont("helvetica", "normal");
            doc.text(`BANCO: ${emisor?.banco || 'N/A'}`, 15, finalY + 6);
            doc.text(`CTA. CORRIENTE: ${emisor?.cuenta || 'N/A'}`, 15, finalY + 11);
            doc.text(`PAGO MÓVIL: ${emisor?.pagomovil || 'N/A'} | C.I/RIF: ${emisor?.cedula || emisor?.rif || 'N/A'}`, 15, finalY + 16);
            
            doc.setFontSize(7).setTextColor(120).text(`${emisor?.direccion || ''} | Teléfono: ${emisor?.telefono || 'N/A'}`, pageWidth / 2, 285, { align: "center" });

            doc.save(`${docType.toUpperCase()}_${safeUpper(receptor?.nombre).replace(/\s+/g, '_')}.pdf`);
        }

        function switchTab(tab, historyType = null) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('bg-indigo-600', 'text-white'));
            
            if (tab === 'recibos') {
                document.getElementById('nav-nuevo').classList.add('bg-indigo-600', 'text-white');
            } else if (tab === 'historial') {
                currentHistoryType = historyType || 'recibos';
                const activeBtn = currentHistoryType === 'recibos' ? 'nav-historial-recibos' : 'nav-historial-presupuestos';
                document.getElementById(activeBtn).classList.add('bg-indigo-600', 'text-white');
                renderHistory();
            }
        }

        function updateDropdowns() {
            const fill = (id, list, key) => { 
                const el = document.getElementById(id);
                el.innerHTML = `<option value="">Seleccionar...</option>` + list.map(i => `<option value="${i.id}">${i[key] || i.nombre}</option>`).join(''); 
            };
            fill('emitter-select', emitters, 'nombre');
            fill('recipient-select', recipients, 'nombre');
            fill('service-select', services, 'descripcion');
            document.getElementById('patients-list').innerHTML = patients.map(p => `<option value="${p.displayName}">`).join('');
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const titleEl = document.getElementById('history-title');
            
            // FILTRAR POR EL TIPO SELECCIONADO
            let dataToShow = [];
            if (currentHistoryType === 'recibos') {
                titleEl.innerHTML = '<i class="fas fa-file-invoice-dollar text-indigo-600"></i> HISTORIAL DE RECIBOS';
                dataToShow = [...savedReceipts];
            } else {
                titleEl.innerHTML = '<i class="fas fa-file-signature text-amber-600"></i> HISTORIAL DE PRESUPUESTOS';
                dataToShow = [...savedBudgets];
            }

            // Ordenar por fecha descendente
            dataToShow.sort((a,b) => {
                const dateA = new Date(a.fecha_creacion || a.fecharecibo || 0);
                const dateB = new Date(b.fecha_creacion || b.fecharecibo || 0);
                return dateB - dateA;
            });
            
            if (dataToShow.length === 0) {
                list.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-20 text-slate-400">
                    <i class="fas fa-folder-open text-4xl mb-4 opacity-20"></i>
                    <p class="font-bold uppercase text-[10px]">No se encontraron ${currentHistoryType} guardados</p>
                </div>`;
                return;
            }

            list.innerHTML = dataToShow.map(r => {
                const isBudget = currentHistoryType === 'presupuestos';
                const badgeClass = isBudget ? "bg-amber-100 text-amber-700" : "bg-emerald-100 text-emerald-700";
                const badgeText = isBudget ? "PRESUPUESTO" : "RECIBO";

                return `
                <div class="p-4 bg-white border border-slate-100 rounded-2xl mb-2 flex justify-between items-center group hover:border-indigo-200 transition-all shadow-sm">
                    <div class="text-[11px]">
                        <span class="px-2 py-0.5 rounded-full text-[8px] font-black ${badgeClass} mb-1 inline-block uppercase">${badgeText}</span><br>
                        <b class="text-indigo-600">${r.numerorecibo || 'S/N'}</b><br>
                        <b class="text-slate-800">${r.nombrereceptor}</b>
                        <span class="text-[9px] text-slate-400 block">${formatDate(r.fecharecibo || r.fecha_creacion)}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick='editDocument("${r.id}")' title="Editar" class="h-8 w-8 bg-slate-100 rounded-full hover:bg-indigo-600 hover:text-white transition-all"><i class="fas fa-edit text-[10px]"></i></button>
                        <button onclick='downloadPDF("${r.id}")' title="Descargar PDF" class="h-8 w-8 bg-slate-100 rounded-full hover:bg-slate-900 hover:text-white transition-all"><i class="fas fa-download text-[10px]"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        window.onload = () => { 
            const savedToken = localStorage.getItem('medcloud_session_token');
            if (savedToken) { SESSION_TOKEN = savedToken; fetchAllData(); }
            document.getElementById('issue-date').valueAsDate = new Date();
            document.getElementById('service-date').valueAsDate = new Date();
            document.getElementById('emitter-select').addEventListener('change', updateUIStatus);
            document.getElementById('doc-type-select').addEventListener('change', updateUIStatus);
            document.getElementById('bcv-rate').addEventListener('input', renderReceiptItems);
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; }
        .hidden { display: none !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="p-4 lg:p-6 min-h-screen flex flex-col lg:flex-row gap-6">
    <div id="login-screen" class="fixed inset-0 bg-white z-[500] flex items-center justify-center p-6">
        <div class="w-full max-w-sm text-center">
            <h1 class="text-2xl font-black mb-8">MEDCLOUD PRO</h1>
            <input type="password" id="login-password" placeholder="TOKEN DE ACCESO" class="w-full p-4 rounded-2xl bg-slate-50 text-center mb-4 border-none ring-1 ring-slate-100 outline-none">
            <button onclick="checkAccess()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">ACCEDER</button>
            <p id="login-error" class="hidden text-rose-500 mt-4 text-[10px] font-bold uppercase tracking-widest">Error de autenticación</p>
        </div>
    </div>

    <div id="global-loader" class="fixed inset-0 bg-white/80 z-[600] flex items-center justify-center hidden">
        <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <aside id="app-container" class="hidden w-full lg:w-80 flex flex-col gap-6">
        <div class="glass-card p-6 flex flex-col items-center">
            <h2 class="text-lg font-black mb-6">MEDCLOUD</h2>
            <div class="w-full space-y-2">
                <button id="nav-nuevo" onclick="switchTab('recibos')" class="nav-btn w-full p-4 rounded-xl bg-indigo-600 text-white font-bold text-xs uppercase">Nuevo Documento</button>
                <div class="pt-4 border-t border-slate-100">
                    <span class="text-[9px] font-black text-slate-300 block mb-2 uppercase ml-2">Historiales</span>
                    <button id="nav-historial-recibos" onclick="switchTab('historial', 'recibos')" class="nav-btn w-full p-3 rounded-xl text-slate-400 font-bold text-[11px] uppercase text-left flex items-center gap-3">
                        <i class="fas fa-receipt w-4"></i> Recibos
                    </button>
                    <button id="nav-historial-presupuestos" onclick="switchTab('historial', 'presupuestos')" class="nav-btn w-full p-3 rounded-xl text-slate-400 font-bold text-[11px] uppercase text-left flex items-center gap-3">
                        <i class="fas fa-file-signature w-4"></i> Presupuestos
                    </button>
                </div>
            </div>
        </div>
        
        <div class="bg-slate-900 p-6 rounded-[2rem] text-white">
            <span class="text-[9px] font-black text-indigo-400 block mb-2 uppercase">Ingresar Tasa BCV</span>
            <input type="number" id="bcv-rate" placeholder="0.00" step="any" class="bg-transparent text-4xl font-black w-full outline-none placeholder-slate-700">
        </div>

        <div class="glass-card p-6 flex-1 overflow-hidden">
            <span class="text-[9px] font-black text-slate-300 block mb-6 uppercase">Información de Emisor</span>
            <div class="space-y-4">
                <p class="text-[10px] font-bold text-slate-700 uppercase">BANCO: <span id="ui-banco" class="font-normal">N/A</span></p>
                <p class="text-[10px] font-bold text-slate-700 uppercase">TELÉFONO: <span id="ui-telefono" class="font-normal">N/A</span></p>
                <p class="text-[10px] font-bold text-slate-700 uppercase">PAGO MÓVIL: <span id="ui-pagomovil" class="font-normal">N/A</span></p>
                <p class="text-[10px] font-bold text-slate-700 uppercase">CONTROL: <span id="ui-correlativo" class="text-indigo-600 font-black">S/N</span></p>
            </div>
        </div>
    </aside>

    <main id="app-main" class="hidden flex-1 flex flex-col gap-6">
        <!-- PESTAÑA EMISIÓN -->
        <div id="tab-recibos" class="tab-content flex-1 glass-card p-6 lg:p-10 flex flex-col gap-6">
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-black text-slate-800 uppercase text-xs tracking-widest">Emisión de Documento</h3>
                <button onclick="resetForm()" class="text-[10px] font-bold text-rose-500 hover:text-rose-700 uppercase"><i class="fas fa-redo mr-1"></i> Reiniciar</button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                <select id="doc-type-select" class="lg:col-span-3 p-4 rounded-xl bg-slate-50 font-bold text-sm border-none ring-1 ring-slate-100 outline-none focus:ring-indigo-600 transition-all">
                    <option value="recibo">Recibo de Pago</option>
                    <option value="presupuesto">Presupuesto de Servicios</option>
                </select>
                <select id="emitter-select" class="p-4 rounded-xl bg-slate-50 text-xs font-bold border-none ring-1 ring-slate-100 outline-none"></select>
                <select id="recipient-select" class="p-4 rounded-xl bg-slate-50 text-xs font-bold border-none ring-1 ring-slate-100 outline-none"></select>
                <input type="date" id="issue-date" class="p-4 rounded-xl bg-slate-50 text-xs font-bold border-none ring-1 ring-slate-100 outline-none">
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-1">
                <div class="lg:col-span-4 space-y-4">
                    <div class="bg-indigo-50/50 p-6 rounded-[2rem] space-y-4">
                        <div id="container-paciente">
                            <input type="text" id="patient-search" list="patients-list" placeholder="Nombre del Paciente..." class="w-full p-4 rounded-xl text-xs font-bold border-none ring-1 ring-slate-100 outline-none">
                            <datalist id="patients-list"></datalist>
                        </div>
                        <select id="service-select" class="w-full p-4 rounded-xl text-xs font-bold border-none ring-1 ring-slate-100 outline-none"></select>
                        <div id="container-fecha-servicio">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-2 mb-1 block">Fecha de Servicio</label>
                            <input type="date" id="service-date" class="w-full p-4 rounded-xl text-xs font-bold bg-white border border-slate-100 outline-none">
                        </div>
                        <div id="container-observaciones" class="hidden">
                            <textarea id="obs-text" rows="3" placeholder="Detalles u observaciones del presupuesto..." class="w-full p-4 rounded-xl text-xs font-bold resize-none border-none ring-1 ring-slate-100 outline-none"></textarea>
                        </div>
                        <button onclick="addServiceToReceipt(event)" class="w-full bg-slate-900 text-white p-4 rounded-xl text-[10px] font-black uppercase hover:bg-black transition-colors">Añadir Servicio</button>
                    </div>
                </div>
                <div class="lg:col-span-8 flex flex-col">
                    <div class="bg-indigo-600 p-6 rounded-[2rem] text-white mb-4 shadow-xl shadow-indigo-200">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="text-[9px] font-bold opacity-60 uppercase">Monto Total USD</span>
                                <div class="text-3xl font-black">$ <span id="total-usd">0,00</span></div>
                            </div>
                            <div class="text-right">
                                <span class="text-[9px] font-bold opacity-60 uppercase">Monto Total Bs.</span>
                                <div class="text-xl font-bold">Bs. <span id="total-bs">0,00</span></div>
                            </div>
                        </div>
                    </div>
                    <div id="receipt-items-list" class="flex-1 bg-slate-50 rounded-[2rem] p-6 mb-4 overflow-y-auto min-h-[200px] border border-dashed border-slate-200"></div>
                    <button onclick="processReceipt()" class="w-full bg-indigo-600 text-white py-6 rounded-3xl font-black text-xs uppercase shadow-lg hover:scale-[1.01] active:scale-95 transition-all">
                        <i class="fas fa-file-pdf mr-2"></i> Generar y Guardar
                    </button>
                </div>
            </div>
        </div>

        <!-- PESTAÑA HISTORIAL INDEPENDIENTE -->
        <div id="tab-historial" class="tab-content hidden flex-1 glass-card p-6 lg:p-10 flex flex-col">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <h2 id="history-title" class="text-xl font-black flex items-center gap-3 uppercase tracking-tight">HISTORIAL</h2>
                <div class="flex gap-2">
                    <button onclick="fetchAllData()" class="px-4 py-2 bg-slate-100 rounded-full text-[10px] font-black uppercase text-slate-600 hover:bg-slate-200"><i class="fas fa-sync-alt mr-1"></i> Sincronizar</button>
                </div>
            </div>
            <div id="history-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 overflow-y-auto flex-1 pr-2 pb-6"></div>
        </div>
    </main>
</body>
</html>
